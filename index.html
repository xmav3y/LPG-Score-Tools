<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LPG Score Tools</title>

<style>
body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #e0e0e0;
    margin: 0;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #888;
}

.container {
    display: flex;
    gap: 30px;
}

.card-block {
    display: flex;
    flex-direction: column;
    align-items: center;
}

.card {
    background: #f5f5f5;
    border-radius: 14px;
    box-shadow: 0 6px 16px rgba(0,0,0,0.12);
    padding: 40px 60px;
    min-width: 220px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s ease;
}

.card h1 {
    font-family: 'Inter', 'Helvetica', 'Arial', sans-serif;
    font-weight: 600;
    margin: 0;
    color: #222;
}

/* Hover colors */
.slpg:hover {
    background: #FF9B49;
    transform: translateY(-4px);
    box-shadow: 0 10px 22px rgba(0,0,0,0.18);
}

.wlpg:hover {
    background: #86D1F4;
    transform: translateY(-4px);
    box-shadow: 0 10px 22px rgba(0,0,0,0.18);
}

.link-under {
    display: block;
    text-align: center;
    margin-top: 10px;
    color: #111;
    text-decoration: none;
    font-size: 14px;
}

.link-under:hover {
    text-decoration: underline;
}

@media (max-width: 600px) {
    .container {
        flex-direction: column;
    }
}
</style>
</head>

<body>

<div class="container">

    <div class="card-block">
        <div class="card slpg" onclick="location.href='SLPG Score Tool 3.5.html'">
            <h1>SLPG</h1>
        </div>
        <a class="link-under" href="SLPG Certification Score Tool 3.5.html">
            SLPG Certification Tool
        </a>
    </div>

    <div class="card-block">
        <div class="card wlpg" onclick="location.href='WLPG Score Tool 3.5.html'">
            <h1>WLPG</h1>
        </div>
        <a class="link-under" href="WLPG Certification Tool 3.5.html">
            WLPG Certification Tool
        </a>
    </div>

</div>

</body>
</html>
